<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Digital Board Tool</title>
        
        <link rel="stylesheet" href="css/tools.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
        </style>
    </head>

    <body>
        <div id="main_conteiner"> 
            <div class="app-container">
                <div class="toolbar">
                    <div class="brand-group">
                        <img id="logoImg" src="assets/images/logo.png" alt="logo">
                        <h1>Digital Board Tool</h1>
                    </div>

                    <div class="tools-dropdown">
                        <button id="toolsDropdownBtn" class="dropdown-btn">
                            <i class="fas fa-paintbrush"></i> Маркер <i class="fas fa-chevron-down"></i>
                        </button>
                        <div id="toolsMenu" class="dropdown-content">
                            <button data-tool="marker" data-icon="fas fa-paintbrush"><i class="fas fa-paintbrush"></i> Маркер</button>
                            <button data-tool="eraser" data-icon="fas fa-eraser"><i class="fas fa-eraser"></i> Ластик</button>
                            <button data-tool="line" data-icon="fas fa-chalkboard-user"><i class="fas fa-chalkboard-user"></i> Линия</button>
                            <button data-tool="rect" data-icon="fas fa-square"><i class="fas fa-square"></i> Прямоугольник</button>
                            <button data-tool="circle" data-icon="fas fa-circle"><i class="fas fa-circle"></i> Круг</button>
                            <button data-tool="triangle" data-icon="fas fa-triangle-exclamation"><i class="fas fa-triangle-exclamation"></i> Треугольник</button>
                            <button data-tool="fill" data-icon="fas fa-fill-drip"><i class="fas fa-fill-drip"></i> Заливка</button>
                            <div style="height: 1px; background: #ccc; margin: 5px 0;"></div>
                            <button data-tool="select-rect" data-icon="fas fa-crop-alt"><i class="fas fa-crop-alt"></i> Захват (прямоугольник)</button>
                            <button data-tool="select-circle" data-icon="fas fa-circle-notch"><i class="fas fa-circle-notch"></i> Захват (круг)</button>
                            <button data-tool="select-free" data-icon="fas fa-draw-polygon"><i class="fas fa-draw-polygon"></i> Захват (свободный)</button>
                        </div>
                    </div>

                    <div class="quick-slots">
                        <div class="slots-label"><i class="fas fa-bolt"></i> Быстрые слоты:</div>
                        <div class="slot-container" id="slotContainer"></div>
                    </div>
            
                    <div class="color-picker-group">
                        <i class="fas fa-palette"></i>
                        <div class="color-swatch" data-color="#000000" style="background:#000;"></div>
                        <div class="color-swatch" data-color="#e74c3c" style="background:#e74c3c;"></div>
                        <div class="color-swatch" data-color="#2ecc71" style="background:#2ecc71;"></div>
                        <div class="color-swatch" data-color="#3498db" style="background:#3498db;"></div>
                        <div class="color-swatch" data-color="#f39c12" style="background:#f39c12;"></div>
                        <div class="color-swatch" data-color="#9b59b6" style="background:#9b59b6;"></div>
                        <input type="color" id="customColorPicker" value="#000000">
                    </div>
            
                    <div class="size-control">
                        <i class="fas fa-pencil-alt"></i>
                        <label>Размер</label>
                        <input type="range" id="brushSize" min="2" max="40" value="6" step="1">
                        <span class="size-value" id="sizeValue">6</span>
                    </div>

                    <div class="board-control">
                        <button id="prevBoardBtn" class="board-nav-btn"><i class="fas fa-chevron-left"></i></button>
                        <span id="boardCounter" class="board-counter">1 / 5</span>
                        <button id="nextBoardBtn" class="board-nav-btn"><i class="fas fa-chevron-right"></i></button>
                    </div>
            
                    <div class="action-group">
                        <button id="settingsBtn" class="settings-btn"><i class="fas fa-cog"></i></button>
                        <button id="clearCanvasBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> Очистить всё</button>
                        <button id="theme-toggle" class="theme-btn">
                            <img id="theme-icon" src="assets/images/moon.png" alt="Сменить тему">
                        </button>
                    </div>
                </div>
            
                <div class="whiteboard">
                    <canvas id="drawCanvas" width="1000" height="800"></canvas>
                    
                    <!-- Панель действий для выделения -->
                    <div class="selection-panel" id="selectionPanel">
                        <button id="copySelectionBtn"><i class="fas fa-copy"></i> Копировать</button>
                        <button id="cutSelectionBtn"><i class="fas fa-cut"></i> Вырезать</button>
                        <button id="pasteSelectionBtn"><i class="fas fa-paste"></i> Вставить</button>
                        
                        <div style="display: flex; gap: 5px; margin: 5px 0; align-items: center;">
                            <span style="color: #ffd966; font-size: 12px;">Градиент:</span>
                            <input type="color" id="gradientColor1" value="#ff0000" style="width: 30px; height: 30px; border-radius: 50%; cursor: pointer;">
                            <input type="color" id="gradientColor2" value="#0000ff" style="width: 30px; height: 30px; border-radius: 50%; cursor: pointer;">
                            <button id="gradientSelectionBtn" style="flex: 1; padding: 5px;"><i class="fas fa-chart-line"></i> Применить</button>
                        </div>
                        
                        <button id="fillSelectionBtn"><i class="fas fa-fill-drip"></i> Заливка</button>
                        <button id="cancelSelectionBtn" class="danger"><i class="fas fa-times"></i> Отменить выделение</button>
                    </div>
                </div>
            </div>

            <footer>
                <div class="separator"></div>
                <div class="social-links">
                    <a href="https://github.com/Gabryelf/Digital-Board"><img src="assets/images/github-logo.png" alt="github"></a>
                </div>
                <div class="separator"></div>
            </footer>
        </div>

        <!-- Оверлей настроек -->
        <div id="settingsOverlay" class="settings-overlay">
            <div class="settings-modal">
                <div class="settings-header">
                    <h2><i class="fas fa-cog"></i> Настройки</h2>
                    <button id="closeSettingsBtn" class="close-settings">&times;</button>
                </div>
                <div class="settings-content">
                    <div class="setting-item">
                        <label><i class="fas fa-layer-group"></i> Количество слотов быстрого доступа:</label>
                        <input type="number" id="slotCountInput" min="1" max="10" value="3" step="1">
                    </div>
                    <div class="setting-item">
                        <label><i class="fas fa-clone"></i> Количество бордов:</label>
                        <input type="number" id="boardCountInput" min="1" max="20" value="5" step="1">
                    </div>
                    <div class="setting-item">
                        <label><i class="fas fa-save"></i> Сохранять выделение после действий:</label>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="selectionKeepMode">
                            <span class="checkbox-custom"></span>
                            <span>Включить режим сохранения выделения</span>
                        </label>
                    </div>
                    <button id="applySettingsBtn" class="apply-settings-btn"><i class="fas fa-check"></i> Применить</button>
                </div>

            </div>
        </div>

        <!-- скрипты -->
        <script src="js/drawing.js"></script>
        <script src="js/selection.js"></script>
        <script src="js/tools.js"></script>
        <script src="js/theme.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
